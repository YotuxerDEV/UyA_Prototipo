<!DOCTYPE html>
<html lang="es">
<head>
    <!-- Metadatos básicos de documento y adaptación responsive -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Reservas - Taxi Transfers Tenerife</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="css/styles.css" rel="stylesheet">
</head>
<body style="padding-top: 82px;">
        <!--
            manage-booking.html
            Objetivo:
            - Permitir a clientes localizar una reserva existente.
            - Solicitar código + email para identificar el registro.
            - Mostrar mensajes de resultado de forma accesible.
        -->

        <!-- Encabezado global con navegación principal -->
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top" aria-label="Navegación principal">
            <div class="container">
                <img src="logo_taxi_color.svg" alt="Taxi logo" width="36" height="28" class="d-inline-block align-text-top">
                <a class="navbar-brand" href="index.html" data-i18n="brand">Taxi Transfer Tenerife</a>
                                <!-- Control de menú para vista móvil -->
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Abrir menú de navegación">
                    <span class="navbar-toggler-icon"></span>
                </button>
                                <!-- Enlaces principales del sitio -->
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="index.html" data-i18n="nav.home">Inicio</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="booking.html" data-i18n="nav.book">Reservar</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="manage-booking.html" data-i18n="nav.manage">Mis Reservas</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="contact.html" data-i18n="nav.contact">Contacto</a>
                        </li>
                        <li class="nav-item d-flex align-items-center ms-lg-2 mt-2 mt-lg-0">
                            <button id="theme-toggle" class="btn btn-outline-light btn-sm nav-control-btn icon-only" type="button" aria-label="Cambiar tema"></button>
                        </li>
                        <li class="nav-item d-flex align-items-center ms-lg-2 mt-2 mt-lg-0">
                            <button id="lang-toggle" class="btn btn-light btn-sm nav-control-btn icon-only" type="button" aria-label="Cambiar idioma"></button>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <!-- Contenido principal: búsqueda y gestión de reserva -->
    <main id="main-content" tabindex="-1">
        <section class="container py-5">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6">
                    <!-- Tarjeta central para agrupar formulario y resultado -->
                    <div class="card shadow-sm">
                        <div class="card-body p-5">
                            <h1 class="card-title h3 mb-4 text-center" data-i18n="manage.title">Mis Reservas</h1>
                            <p class="card-text text-center mb-4" data-i18n="manage.subtitle">Introduce tu código de reserva y correo electrónico para consultar o gestionar tu viaje.</p>
                            
                            <!--
                              Formulario de consulta:
                              - Solicita identificadores mínimos para localizar una reserva.
                              - Usa novalidate para permitir control de errores desde JavaScript.
                            -->
                            <form action="#" method="POST" id="manage-form" novalidate aria-label="Formulario para buscar reserva existente">
                                <!-- Código de referencia entregado al confirmar la reserva -->
                                <div class="mb-4">
                                    <label for="codigo_reserva" class="form-label fw-semibold"><span data-i18n="manage.fields.code">Código de Reserva</span> <span class="text-danger" aria-hidden="true">*</span></label>
                                    <input type="text" class="form-control form-control-lg" id="codigo_reserva" name="codigo_reserva" placeholder="Ej. TX-12345" required aria-required="true" data-i18n-placeholder="manage.placeholders.code">
                                </div>
                                
                                <!-- Email usado en la reserva para verificación cruzada -->
                                <div class="mb-4">
                                    <label for="email_reserva" class="form-label fw-semibold"><span data-i18n="manage.fields.email">Correo Electrónico</span> <span class="text-danger" aria-hidden="true">*</span></label>
                                    <input type="email" class="form-control form-control-lg" id="email_reserva" name="email_reserva" placeholder="correo@ejemplo.com" required aria-required="true" data-i18n-placeholder="manage.placeholders.email">
                                </div>
                                
                                <!-- Acción principal de búsqueda -->
                                <div class="d-grid gap-2">
                                    <button type="submit" class="btn btn-primary btn-lg" data-i18n="manage.submit">Buscar Reserva</button>
                                </div>
                            </form>
                            
                            <!--
                              Región dinámica para resultados:
                              - aria-live="polite" anuncia cambios sin interrumpir al usuario.
                              - aria-atomic="true" lee el bloque completo cuando se actualiza.
                            -->
                            <div id="resultado-reserva" class="mt-4" aria-live="polite" aria-atomic="true"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Pie legal del sitio -->
    <footer class="bg-dark text-white text-center py-4 mt-5">
        <div class="container">
            <div class="social-footer d-flex justify-content-center gap-3 mb-3">
                <a href="https://www.youtube.com" target="_blank" aria-label="Ir a YouTube">
                    <img src="img_youtube.png" alt="YouTube" width="28" height="28">
                </a>
                <a href="https://twitter.com" target="_blank" aria-label="Ir a Twitter">
                    <img src="img_twitter.png" alt="Twitter" width="28" height="28">
                </a>
            </div>
            <p class="mb-0" data-i18n="footer.rights">&copy; 2026 Taxi Transfer TFS. Todos los derechos reservados.</p>
            <p class="mb-0 small mt-1"><a href="privacy.html" class="text-white-50" data-i18n="footer.privacy">Consulta nuestra Política de privacidad.</a></p>
        </div>
    </footer>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <!-- Lógica de validaciones y feedback accesible -->
    <script src="js/main.js"></script>
    <script src="js/taxiPlanner.js"></script>
</body>
</html>
