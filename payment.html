<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago Seguro - Taxi Transfers Tenerife</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body style="padding-top: 82px;">
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top" aria-label="Navegación principal">
            <div class="container">
                <img src="logo_taxi_color.svg" alt="Taxi logo" width="36" height="28" class="d-inline-block align-text-top">
                <a class="navbar-brand" href="index.html" data-i18n="brand">Taxi Transfer Tenerife</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Abrir menú de navegación">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="index.html" data-i18n="nav.home">Inicio</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="booking.html" data-i18n="nav.book">Reservar</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="manage-booking.html" data-i18n="nav.manage">Mis Reservas</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="contact.html" data-i18n="nav.contact">Contacto</a>
                        </li>
                        <li class="nav-item d-flex align-items-center ms-lg-2 mt-2 mt-lg-0">
                            <button id="theme-toggle" class="btn btn-outline-light btn-sm nav-control-btn icon-only" type="button" aria-label="Cambiar tema"></button>
                        </li>
                        <li class="nav-item d-flex align-items-center ms-lg-2 mt-2 mt-lg-0">
                            <button id="lang-toggle" class="btn btn-light btn-sm nav-control-btn icon-only" type="button" aria-label="Cambiar idioma"></button>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container py-5">
        <div class="row g-4 justify-content-center">
            <div class="col-lg-5">
                <div id="payment-summary">
                    <!-- Resumen de pago renderizado por enhancements.js -->
                </div>
            </div>
            <div class="col-lg-5">
                <h1 class="mb-4">Pago Seguro</h1>
                <p class="text-muted mb-4">Completa tu pago para confirmar la reserva</p>

                <form id="payment-form" class="bg-white p-4 rounded shadow-sm" novalidate>
                    <div class="mb-3">
                        <label for="card-holder" class="form-label fw-semibold">Titular de la tarjeta</label>
                        <input id="card-holder" class="form-control" type="text" required placeholder="Nombre completo">
                    </div>

                    <div class="mb-3">
                        <label for="card-number" class="form-label fw-semibold">Número de tarjeta</label>
                        <input id="card-number" class="form-control" type="text" required maxlength="19" placeholder="1234 5678 9012 3456" inputmode="numeric">
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="card-exp" class="form-label fw-semibold">Vencimiento</label>
                            <input id="card-exp" class="form-control" type="text" required placeholder="MM/AA" maxlength="5">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="card-cvv" class="form-label fw-semibold">CVV</label>
                            <input id="card-cvv" class="form-control" type="password" required maxlength="4" placeholder="123">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg w-100 mt-4">Procesar Pago</button>
                </form>
            </div>
        </div>
    </main>

    <script>
        // Renderizar resumen de pago cuando carga la página
        document.addEventListener('DOMContentLoaded', () => {
            if (window.renderPaymentSummary) {
                window.renderPaymentSummary();
            }
        });
    </script>

    <footer class="bg-dark text-white text-center py-4 mt-5">
        <div class="container">
            <div class="social-footer d-flex justify-content-center gap-3 mb-3">
                <a href="https://www.youtube.com" target="_blank" aria-label="Ir a YouTube">
                    <img src="img_youtube.png" alt="YouTube" width="28" height="28">
                </a>
                <a href="https://twitter.com" target="_blank" aria-label="Ir a Twitter">
                    <img src="img_twitter.png" alt="Twitter" width="28" height="28">
                </a>
            </div>
            <p class="mb-0" data-i18n="footer.rights">&copy; 2026 Taxi Transfer TFS. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/enhancements.js"></script>
</body>
</html>
